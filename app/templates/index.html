
<!DOCTYPE html>
<html>
<head>
<title>Green Route</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container py-5">
<h2 class="mb-4">Green Route – Carbon Efficient Travel</h2>

<form method="POST">
<div class="row mb-3">
<div class="col">
<select name="from" class="form-select">
{% for c in cities %}
<option value="{{c}}">{{c}}</option>
{% endfor %}
</select>
</div>

<div class="col">
<select name="to" class="form-select">
{% for c in cities %}
<option value="{{c}}">{{c}}</option>
{% endfor %}
</select>
</div>
</div>

<button class="btn btn-success">Calculate</button>
</form>

{% if result %}
<hr>
<h4>Distance: {{result.distance}} km</h4>
<h5>Recommended Mode: <b>{{result.best}}</b></h5>
<ul>
{% for k,v in result.emissions.items() %}
<li>{{k}} : {{v}} kg CO₂</li>
{% endfor %}
</ul>
{% endif %}

</body>
</html>
